<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emyris Admin | Central Command</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; padding: 2rem; border-right: 1px solid var(--glass-border); }
        .main-content { margin-left: 280px; padding: 3rem; }
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 12px 20px; 
            border-radius: 12px; color: var(--text-dim); text-decoration: none; margin-bottom: 8px; transition: all 0.3s;
        }
        .nav-link.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }
        .nav-link:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }
        .tab-section { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-section.active { display: block; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #22c55e; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <aside class="sidebar glass-panel" id="adminSidebar" style="display: none;">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 3rem;">
            <img src="logo.png" style="height: 35px;">
            <h2 style="font-size: 1.2rem; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">EMYRIS ADMIN</h2>
        </div>
        
        <a href="#" class="nav-link active" onclick="showTab('vault')"><i data-lucide="package"></i> Product Vault</a>
        <a href="#" class="nav-link" onclick="showTab('hub')"><i data-lucide="building"></i> Central Hub</a>
        <a href="#" class="nav-link" onclick="showTab('employees')"><i data-lucide="users"></i> Employee Hub</a>
        
        <div style="position: absolute; bottom: 2rem; left: 2rem; right: 2rem;">
            <button class="btn btn-glass" style="width: 100%;" onclick="logout()"><i data-lucide="log-out"></i> Logout</button>
        </div>
    </aside>

    <main id="authScreen" class="auth-container">
        <div class="glass-panel auth-card animate-fade">
            <h1>Admin Login</h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Secure Access Only</p>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="EMYRISLMS">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="handleLogin()">Enter Dashboard</button>
        </div>
    </main>

    <main id="adminPortal" class="main-content" style="display: none;">
        
        <!-- 1. PRODUCT VAULT -->
        <section id="vault" class="tab-section active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h1>Product Vault</h1>
                <button class="btn btn-primary" onclick="openModal('productModal')">+ Add Product</button>
            </div>
            <div id="adminProductGrid" class="dashboard-grid"></div>
        </section>

        <!-- 2. CENTRAL HUB -->
        <section id="hub" class="tab-section">
            <h1>Admin Central Hub</h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Update company identity and contact details</p>
            
            <div class="glass-panel" style="padding: 3rem; max-width: 800px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="input-group" style="grid-column: span 2; display: flex; align-items: center; gap: 2rem;">
                        <div id="logoPreviewContainer" style="width: 100px; height: 100px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px dashed var(--glass-border); display: flex; align-items: center; justify-content: center; overflow: hidden;">
                            <img id="c_logo_preview" src="" style="max-width: 100%; max-height: 100%; display: none;">
                            <span id="noLogoText" style="font-size: 0.7rem; color: var(--text-dim);">No Logo</span>
                        </div>
                        <div style="flex: 1;">
                            <label>Update Company Logo</label>
                            <input type="file" id="c_logo_file" accept="image/*" onchange="previewLogo(this)">
                        </div>
                    </div>
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Registered Address</label>
                        <textarea id="c_address" rows="3"></textarea>
                    </div>
                    <div class="input-group">
                        <label>Telephone</label>
                        <input type="text" id="c_phone">
                    </div>
                    <div class="input-group">
                        <label>Toll Free No.</label>
                        <input type="text" id="c_tollfree">
                    </div>
                    <div class="input-group">
                        <label>Website</label>
                        <input type="text" id="c_web">
                    </div>
                </div>
                <button class="btn btn-primary" style="margin-top: 2rem;" onclick="saveCompany()">Update Central Hub</button>
            </div>
        </section>

        <!-- 3. EMPLOYEE HUB -->
        <section id="employees" class="tab-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h1>Employee Hub</h1>
                <button class="btn btn-primary" onclick="openModal('empModal')">+ Register Staff</button>
            </div>
            
            <div class="glass-panel" style="overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead style="background: rgba(255,255,255,0.05);">
                        <tr>
                            <th style="padding: 1.5rem;">Employee Name</th>
                            <th>ID / Code</th>
                            <th>Password</th>
                            <th>Access Status</th>
                        </tr>
                    </thead>
                    <tbody id="empTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="productModal" class="modal">
        <div class="glass-panel modal-content">
            <h2>Add Product</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin: 2rem 0;">
                <div class="input-group"><label>Title</label><input type="text" id="p_title"></div>
                <div class="input-group"><label>Category</label><select id="p_category">
                    <option>Injectables</option><option>Enteral Nutrition</option><option>Nutraceuticals</option><option>Pharmaceuticals</option>
                </select></div>
                <div class="input-group" style="grid-column: span 2;"><label>Scientific Info</label><textarea id="p_info" rows="4"></textarea></div>
                <div class="input-group"><label>Photo (Packing)</label><input type="file" id="p_image"></div>
                <div class="input-group"><label>Video URL</label><input type="text" id="p_video"></div>
                <div class="input-group" style="grid-column: span 2;"><label>Journals (PDF)</label><input type="file" id="p_docs" multiple></div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                <button class="btn btn-glass" onclick="closeModal('productModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>

    <div id="empModal" class="modal">
        <div class="glass-panel modal-content" style="max-width: 500px;">
            <h2>Register New Employee</h2>
            <div style="margin: 2rem 0;">
                <div class="input-group"><label>Full Name</label><input type="text" id="e_name"></div>
                <div class="input-group"><label>Employee ID / Code</label><input type="text" id="e_code"></div>
                <div class="input-group"><label>Initial Password</label><input type="text" id="e_pass"></div>
            </div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="saveEmployee()">Activate Account</button>
        </div>
    </div>

    <script>
        const API = '/api';
        function initIcons() { lucide.createIcons(); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { window.location.href = '/'; }

        function showTab(tabId) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabId === 'vault') fetchProducts();
            if(tabId === 'hub') fetchCompany();
            if(tabId === 'employees') fetchEmployees();
            initIcons();
        }

        async function handleLogin() {
            const empCode = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ empCode, password, isAdmin: true })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('adminSidebar').style.display = 'block';
                document.getElementById('adminPortal').style.display = 'block';
                showTab('vault');
            } else { alert('Access Denied'); }
        }

        async function fetchProducts() {
            const res = await fetch(`${API}/products`);
            const data = await res.json();
            document.getElementById('adminProductGrid').innerHTML = data.products.map(p => `
                <div class="glass-panel product-card">
                    <div class="product-content">
                        <span class="badge">${p.category}</span>
                        <h3>${p.title}</h3>
                        <button class="btn btn-glass" style="margin-top: 1rem; color: #f43f5e;" onclick="deleteProduct('${p._id}')"><i data-lucide="trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
            initIcons();
        }

        async function fetchCompany() {
            const res = await fetch(`${API}/company`);
            const data = await res.json();
            document.getElementById('c_address').value = data.address || '';
            document.getElementById('c_phone').value = data.phone || '';
            document.getElementById('c_web').value = data.website || '';
            document.getElementById('c_tollfree').value = data.tollFree || '';
            
            if (data.logo) {
                document.getElementById('c_logo_preview').src = data.logo;
                document.getElementById('c_logo_preview').style.display = 'block';
                document.getElementById('noLogoText').style.display = 'none';
            }
        }

        let tempLogoBase64 = null;
        async function previewLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempLogoBase64 = e.target.result;
                    document.getElementById('c_logo_preview').src = e.target.result;
                    document.getElementById('c_logo_preview').style.display = 'block';
                    document.getElementById('noLogoText').style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveCompany() {
            const payload = {
                address: document.getElementById('c_address').value,
                phone: document.getElementById('c_phone').value,
                website: document.getElementById('c_web').value,
                tollFree: document.getElementById('c_tollfree').value
            };
            
            if (tempLogoBase64) {
                payload.logo = tempLogoBase64;
            }

            await fetch(`${API}/company`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert('Central Hub Updated');
            tempLogoBase64 = null;
        }

        async function fetchEmployees() {
            const res = await fetch(`${API}/employees`);
            const data = await res.json();
            document.getElementById('empTableBody').innerHTML = data.employees.map(e => `
                <tr style="border-bottom: 1px solid var(--glass-border);">
                    <td style="padding: 1.5rem;">${e.name}</td>
                    <td>${e.empCode}</td>
                    <td>${e.password}</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" ${e.active ? 'checked' : ''} onchange="toggleEmp('${e._id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                        <span style="margin-left: 10px; color: ${e.active ? '#22c55e' : '#f43f5e'}">${e.active ? 'ACTIVE' : 'DEACTIVATED'}</span>
                    </td>
                </tr>
            `).join('');
        }

        async function saveEmployee() {
            const payload = { 
                name: document.getElementById('e_name').value,
                empCode: document.getElementById('e_code').value,
                password: document.getElementById('e_pass').value
            };
            await fetch(`${API}/employees`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            closeModal('empModal');
            fetchEmployees();
        }

        async function toggleEmp(id, active) {
            await fetch(`${API}/employees/${id}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ active })
            });
            fetchEmployees();
        }

        async function saveProduct() {
            const p_title = document.getElementById('p_title').value;
            const p_category = document.getElementById('p_category').value;
            const p_info = document.getElementById('p_info').value;
            const p_video = document.getElementById('p_video').value;
            const imgFile = document.getElementById('p_image').files[0];
            const docFiles = document.getElementById('p_docs').files;
            
            const b64 = (f) => new Promise(r => { const reader = new FileReader(); reader.readAsDataURL(f); reader.onload = () => r(reader.result); });
            
            let img = imgFile ? await b64(imgFile) : '';
            let docs = [];
            for (let f of docFiles) { docs.push({ name: f.name, data: await b64(f) }); }

            await fetch(`${API}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: p_title, category: p_category, scientificInfo: p_info, videoUrl: p_video, image: img, documents: docs })
            });
            closeModal('productModal');
            fetchProducts();
        }

        async function deleteProduct(id) {
            if(!confirm('Delete?')) return;
            await fetch(`${API}/products/${id}`, { method: 'DELETE' });
            fetchProducts();
        }
        
        window.onload = initIcons;
    </script>
</body>
</html>

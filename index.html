<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Emyris Learning Management System - Scientific Knowledge Hub">
    <title>Emyris LMS | Scientific Knowledge Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav id="mainNav" style="display: none;">
        <div class="logo-area">
            <img id="appLogoNav" src="logo.png" alt="Logo" style="height: 40px;">
            <h1>EMYRIS LMS</h1>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <span id="userInfo" style="font-weight: 600; color: var(--text-dim);"></span>
            <button class="btn btn-glass" onclick="logout()">
                <i data-lucide="log-out"></i> Logout
            </button>
        </div>
    </nav>

    <main id="authScreen" class="auth-container">
        <div class="glass-panel auth-card animate-fade">
            <img id="appLogoAuth" src="logo.png" alt="Logo" style="height: 80px; margin-bottom: 1.5rem;">
            <h1 style="margin-bottom: 0.5rem; font-size: 2.5rem; letter-spacing: -1px;">Emyris LMS</h1>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Scientific Portal Login</p>
            
            <div class="input-group">
                <label id="idLabel">Employee Code</label>
                <input type="text" id="username" placeholder="e.g. user" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn btn-primary" style="width: 100%; justify-content: center; font-size: 1.1rem; margin-bottom: 1.5rem;" onclick="handleLogin()">
                Access Portal <i data-lucide="chevron-right"></i>
            </button>

            <p id="roleSubtext" style="font-size: 0.85rem; color: var(--text-dim);">
                Secure Access Only. <a href="#" onclick="setRole('admin')" style="color: var(--primary); text-decoration: none; font-weight: 600;">Administrator Portal</a>
            </p>

            <div id="companyInfo" style="margin-top: 2rem; font-size: 0.75rem; color: var(--text-dim); display: flex; justify-content: center; gap: 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem;">
                <span id="display_contact"></span>
                <span id="display_website"></span>
            </div>
        </div>
    </main>

    <main id="employeePortal" style="display: none; padding: 2rem 5%;">
        <div style="margin-bottom: 3rem; text-align: center;">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">Scientific Hub</h1>
            <p style="color: var(--text-dim); max-width: 600px; margin: 0 auto;">Select a category to explore clinical data, compositions, and indications.</p>
        </div>

        <div class="filter-container" id="categoryFilter">
            <!-- Dynamic Category Buttons will be injected here -->
        </div>

        <div id="empProductGrid" class="dashboard-grid"></div>
    </main>

    <div id="detailModal" class="modal">
        <div class="glass-panel modal-content animate-fade" id="detailContent"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
